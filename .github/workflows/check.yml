name: Check Amazon UK jobs

on:
  schedule:
    # GitHub's free cron is unreliable (often delayed or skipped), so the
    # real 5-minute cycle comes from the last step below: each run triggers
    # the next one. This cron is just a BACKUP that restarts the chain if it
    # ever breaks.
    - cron: "3-58/5 * * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button + self-trigger

permissions:
  contents: write         # needed to commit state.json back
  actions: write          # needed so a run can trigger the next run

concurrency:
  group: job-check
  cancel-in-progress: false   # never kill a run that's mid-alert

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new jobs
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_jobs.py

      - name: Save the bot's memory (state.json)
        run: |
          git config user.name "job-watch-bot"
          git config user.email "job-watch-bot@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json unchanged - nothing to commit"
          else
            git commit -m "Update job memory"
            git pull --rebase origin main || true
            git push || echo "Push failed - next run will retry"
          fi

      - name: Trigger the next check in ~4 minutes (self-scheduling chain)
        if: always()   # keep the chain alive even if a step above failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 240
          # If another run is already waiting (e.g. the backup cron fired),
          # let that one carry the chain instead of starting a duplicate.
          queued=$(gh run list --workflow check.yml --status queued --json databaseId --jq 'length')
          if [ "$queued" -gt 0 ]; then
            echo "another run is already queued - not dispatching a new one"
          else
            gh workflow run check.yml --ref main
            echo "next check dispatched"
          fi
